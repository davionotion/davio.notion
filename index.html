<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação — Plataforma de Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0a0a;
    --ink-2: #3a3a3a;
    --ink-3: #8a8a8a;
    --ink-4: #c8c8c8;
    --surface: #ffffff;
    --bg: #f8f8f8;
    --border: #ebebeb;
    --border-strong: #c8c8c8;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Geist', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Geist', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .logo span { color: var(--ink-3); }

  .progress-bar-wrap {
    flex: 1;
    max-width: 200px;
    margin: 0 2rem;
  }

  .progress-label {
    font-size: 11px;
    color: var(--ink-3);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .progress-bar-track {
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  main {
    padding-top: 56px;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 640px;
    padding: 3rem 1.5rem 6rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .section-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 0.5rem;
  }

  .section-title {
    font-family: 'Geist', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.4rem;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }

  .section-desc {
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.6;
    margin-bottom: 2rem;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 2rem;
  }

  .question { margin-bottom: 2rem; }
  .question:last-of-type { margin-bottom: 0; }

  .q-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.5rem;
    line-height: 1.5;
  }

  .q-sub {
    font-size: 12px;
    color: var(--ink-3);
    margin-bottom: 0.75rem;
    line-height: 1.5;
  }

  .options { display: flex; flex-direction: column; gap: 5px; }

  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 13px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    color: var(--ink-2);
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
    line-height: 1.45;
  }

  .opt:hover { border-color: var(--border-strong); background: #fafaf8; }
  .opt.selected { border-color: var(--ink); background: #fafaf8; color: var(--ink); }
  .opt input { margin-top: 2px; accent-color: var(--ink); flex-shrink: 0; width: 14px; height: 14px; }

  .scale-row { display: flex; gap: 5px; }

  .scale-btn {
    flex: 1;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-3);
    transition: all 0.15s;
  }

  .scale-btn:hover { border-color: var(--border-strong); color: var(--ink); background: #fafaf8; }
  .scale-btn.selected { border-color: var(--ink); background: var(--ink); color: #fff; }

  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 5px;
  }

  .nps-row { display: flex; gap: 4px; flex-wrap: wrap; }

  .nps-btn {
    flex: 1;
    min-width: 36px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-3);
    transition: all 0.15s;
  }

  .nps-btn:hover { border-color: var(--border-strong); color: var(--ink); }
  .nps-btn.selected { border-color: var(--ink); background: var(--ink); color: #fff; }

  .q-group { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  .q-group-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 11px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .q-group-item:last-child { border-bottom: none; }
  .q-group-label { font-size: 13px; color: var(--ink-2); flex: 1; line-height: 1.4; }

  .scale-mini { display: flex; gap: 3px; }

  .scale-mini span {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-3);
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .scale-mini span:hover { border-color: var(--border-strong); color: var(--ink); }
  .scale-mini span.selected { border-color: var(--ink); background: var(--ink); color: #fff; }

  textarea {
    width: 100%;
    min-height: 80px;
    resize: vertical;
    padding: 10px 13px;
    font-size: 13px;
    font-family: 'Geist', sans-serif;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--ink);
    line-height: 1.5;
    transition: border-color 0.15s;
    outline: none;
  }

  textarea:focus { border-color: var(--border-strong); }
  textarea::placeholder { color: var(--ink-4); }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .nav-pills { display: flex; gap: 5px; }

  .pip {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.25s;
  }

  .pip.active { background: var(--ink); width: 18px; border-radius: 99px; }
  .pip.done { background: var(--ink-4); }

  .nav-btns { display: flex; gap: 8px; }

  .btn {
    padding: 8px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    font-family: 'Geist', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink-2);
  }

  .btn:hover { background: #f5f4f0; border-color: var(--border-strong); color: var(--ink); }

  .btn-primary {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  .btn-primary:hover { background: #222220; }

  .success { text-align: center; padding: 2rem 0; }

  .success-check {
    width: 52px;
    height: 52px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }

  .success-check svg { width: 22px; height: 22px; stroke: var(--ink); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .success h2 {
    font-family: 'Geist', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .success p {
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.6;
    max-width: 340px;
    margin: 0 auto;
  }

  @media (max-width: 600px) {
    .card { padding: 1.75rem 1.25rem; }
    .container { padding: 2rem 1rem 5rem; }
    .section-title { font-size: 20px; }
    .progress-bar-wrap { display: none; }
    .nps-btn { min-width: 28px; height: 34px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Plataforma de Flashcards <span>/ Avaliação</span></div>
  <div class="progress-bar-wrap">
    <div class="progress-label" id="progressLabel">Seção 1 de 7</div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>
  <div style="width:120px"></div>
</header>

<main>
  <div class="container">
    <div class="card" id="formCard">
      <div id="sectionContent"></div>
      <div class="nav" id="navArea"></div>
    </div>
  </div>
</main>

<script>
const answers = {};

const sections = [
  {
    label: 'Seção 1 de 7',
    title: 'Perfil do usuário',
    desc: 'Queremos entender quem você é para cruzar isso com sua experiência no produto.',
    questions: [
      { id:'q1', type:'single', text:'Qual é o seu objetivo principal ao usar flashcards?', opts:['Memorizar conteúdo novo','Revisar o que já estudei','Fixar termos e definições','Preparar para provas ou exames','Aprender no dia a dia, sem meta específica'] },
      { id:'q2', type:'single', text:'Com qual frequência você costuma estudar com flashcards?', opts:['Todos os dias','Algumas vezes por semana','Uma vez por semana','Raramente','Era minha primeira vez ao comprar o template'] },
      { id:'q3', type:'single', text:'Você já usava Notion antes de adquirir a Plataforma de Flashcards?', sub:'Essa resposta nos ajuda a entender se dificuldades são do produto ou da curva de aprendizado do Notion.', opts:['Nunca usei','Já tinha usado pouco','Uso com frequência','Uso muito bem'] },
    ]
  },
  {
    label: 'Seção 2 de 7',
    title: 'Ativação inicial',
    desc: 'Queremos saber se você conseguiu chegar ao primeiro momento de valor com o produto.',
    questions: [
      { id:'q4', type:'scale5', text:'Você conseguiu duplicar e acessar o template sem dificuldade?', labelL:'Muita dificuldade', labelR:'Sem nenhuma dificuldade' },
      { id:'q5', type:'single', text:'Quanto tempo você levou para criar seu primeiro flashcard?', opts:['Menos de 5 minutos','5 a 15 minutos','15 a 30 minutos','Mais de 30 minutos','Ainda não criei nenhum'] },
      { id:'q6', type:'single', text:'O manual de uso foi suficiente para você começar?', opts:['Sim, totalmente','Sim, mas precisei testar bastante','Parcialmente','Não, fiquei perdido','Não usei o manual'] },
      { id:'q7', type:'text', text:'Qual foi sua maior dificuldade ao começar a usar o produto?', placeholder:'Descreva com suas próprias palavras...' },
    ]
  },
  {
    label: 'Seção 3 de 7',
    title: 'Uso das funcionalidades',
    desc: 'Queremos saber quais recursos realmente fazem diferença no seu dia a dia.',
    questions: [
      { id:'q8', type:'multi', text:'Quais funcionalidades você já usou?', opts:['Criação de flashcards','Revisão de flashcards','Organização por decks / matéria','Organização por tema ou tag','Filtragem de cards','Indicador de domínio (sei / não sei)','Ainda não usei nenhuma com frequência'] },
      { id:'q9', type:'single', text:'Qual funcionalidade mais te ajuda nos estudos?', opts:['Criação de flashcards','Revisão de flashcards','Organização por decks','Filtragem de cards','Indicador de domínio','Outra'] },
      { id:'q10', type:'single+text', text:'Qual funcionalidade você achou menos útil ou menos clara?', sub:'Escolha uma e, se quiser, explique o motivo.', opts:['Criação de flashcards','Revisão de flashcards','Organização por decks','Filtragem de cards','Indicador de domínio','Outra'], textPlaceholder:'Quer explicar? (opcional)' },
    ]
  },
  {
    label: 'Seção 4 de 7',
    title: 'Valor percebido',
    desc: 'Avalie de 1 a 5 o quanto a Plataforma de Flashcards te ajudou em cada aspecto.',
    questions: [
      { id:'q_group1', type:'group', items: [
        { id:'q11', text:'Facilitou a criação e organização dos meus flashcards' },
        { id:'q12', text:'Me ajudou a revisar o conteúdo de forma mais consistente' },
        { id:'q13', text:'Tornou meu estudo mais eficiente e focado' },
        { id:'q14', text:'Me deu clareza sobre o que já sei e o que ainda preciso estudar' },
        { id:'q15', text:'Reduziu a sensação de desorganização nos estudos' },
      ]}
    ]
  },
  {
    label: 'Seção 5 de 7',
    title: 'Frequência e retenção',
    desc: 'Queremos saber se o produto está virando hábito na sua rotina.',
    questions: [
      { id:'q16', type:'single', text:'Com que frequência você usa a Plataforma de Flashcards?', opts:['Todos os dias','4 a 6 vezes por semana','2 a 3 vezes por semana','1 vez por semana','Usei uma vez e parei','Ainda não comecei a usar de verdade'] },
      { id:'q17', type:'single', text:'Em qual momento do dia você costuma usar?', opts:['De manhã, antes de começar o dia','Durante as pausas de estudo','À noite, como revisão','No planejamento semanal','Só quando lembro','Ainda não criei rotina'] },
      { id:'q18', type:'multi', text:'O que mais atrapalha seu uso contínuo?', opts:['Falta de hábito','Dificuldade com Notion','Template parece complexo','Esqueço de registrar ou revisar','Prefiro outro método (papel, Anki etc.)','Não entendi bem como usar','Não senti necessidade','Outro'] },
    ]
  },
  {
    label: 'Seção 6 de 7',
    title: 'Avaliação e recomendação',
    desc: 'Aqui medimos o potencial de crescimento do produto.',
    questions: [
      { id:'q19', type:'nps', text:'De 0 a 10, o quanto você recomendaria a Plataforma de Flashcards para outra pessoa?' },
      { id:'q20', type:'scale5', text:'Qual nota você daria para a Plataforma de Flashcards como produto?', labelL:'Muito fraco', labelR:'Excelente' },
      { id:'q21', type:'single', text:'O preço parece justo para o valor entregue?', opts:['Muito barato pelo que entrega','Justo','Um pouco caro','Muito caro','Não sei avaliar'] },
      { id:'q22', type:'text', text:'O que faria você recomendar esse produto para um amigo?', placeholder:'Seja direto...' },
      { id:'q23', type:'text', text:'O que faria você não recomendar?', placeholder:'Essa resposta é muito valiosa para nós...' },
    ]
  },
  {
    label: 'Seção 7 de 7',
    title: 'Melhorias e roadmap',
    desc: 'Suas ideias nos ajudam a priorizar o que construir a seguir.',
    questions: [
      { id:'q24', type:'text', text:'O que você gostaria que fosse mais simples na Plataforma de Flashcards?', placeholder:'Seja específico se puder...' },
      { id:'q25', type:'multi', text:'Que funcionalidade você gostaria em uma próxima versão?', opts:['Dashboard de progresso geral','Contador de cards revisados por dia','Metas de revisão diária ou semanal','Modo de revisão cronometrado','Geração automática de flashcards','Integração com resumos e anotações','Área de flashcards por dificuldade','Gamificação (pontos, sequências)','Vídeo tutorial','Comunidade / suporte','Outro'] },
      { id:'q26', type:'text', text:'Se você pudesse mudar uma única coisa no produto, o que mudaria?', placeholder:'Uma coisa só...' },
      { id:'q27', type:'single', text:'Você autoriza que sua resposta seja usada de forma anônima para melhorar o produto?', opts:['Sim','Não'] },
    ]
  }
];

let current = 0;

function updateHeader() {
  document.getElementById('progressLabel').textContent = sections[current].label;
  document.getElementById('progressFill').style.width = ((current + 1) / sections.length * 100) + '%';
}

function renderScale5(q) {
  const cur = answers[q.id] || 0;
  let h = `<div class="question"><p class="q-label">${q.text}</p><div class="scale-row">`;
  for (let i = 1; i <= 5; i++) h += `<div class="scale-btn${cur===i?' selected':''}" data-qid="${q.id}" data-val="${i}">${i}</div>`;
  h += `</div><div class="scale-labels"><span>${q.labelL}</span><span>${q.labelR}</span></div></div>`;
  return h;
}

function renderSingle(q) {
  const cur = answers[q.id] || '';
  let h = `<div class="question"><p class="q-label">${q.text}</p>`;
  if (q.sub) h += `<p class="q-sub">${q.sub}</p>`;
  h += `<div class="options">`;
  q.opts.forEach(o => {
    h += `<label class="opt${cur===o?' selected':''}"><input type="radio" name="${q.id}" value="${o}"${cur===o?' checked':''}><span>${o}</span></label>`;
  });
  h += `</div></div>`;
  return h;
}

function renderMulti(q) {
  const cur = answers[q.id] || [];
  let h = `<div class="question"><p class="q-label">${q.text}</p><div class="options">`;
  q.opts.forEach(o => {
    const checked = cur.includes(o);
    h += `<label class="opt${checked?' selected':''}"><input type="checkbox" name="${q.id}" value="${o}"${checked?' checked':''}><span>${o}</span></label>`;
  });
  h += `</div></div>`;
  return h;
}

function renderText(q) {
  const cur = answers[q.id] || '';
  return `<div class="question"><p class="q-label">${q.text}</p><textarea id="${q.id}" placeholder="${q.placeholder||''}">${cur}</textarea></div>`;
}

function renderSingleText(q) {
  const cur = answers[q.id] || { sel: '', txt: '' };
  let h = `<div class="question"><p class="q-label">${q.text}</p>`;
  if (q.sub) h += `<p class="q-sub">${q.sub}</p>`;
  h += `<div class="options">`;
  q.opts.forEach(o => {
    h += `<label class="opt${cur.sel===o?' selected':''}"><input type="radio" name="${q.id}_sel" value="${o}"${cur.sel===o?' checked':''}><span>${o}</span></label>`;
  });
  h += `</div><div style="margin-top:8px"><textarea id="${q.id}_txt" placeholder="${q.textPlaceholder||''}" style="min-height:60px">${cur.txt||''}</textarea></div></div>`;
  return h;
}

function renderNps(q) {
  const cur = answers[q.id];
  let h = `<div class="question"><p class="q-label">${q.text}</p><div class="nps-row">`;
  for (let i = 0; i <= 10; i++) h += `<div class="nps-btn${cur===i?' selected':''}" data-qid="${q.id}" data-val="${i}">${i}</div>`;
  h += `</div><div class="scale-labels" style="margin-top:5px"><span>Nada provável</span><span>Extremamente provável</span></div></div>`;
  return h;
}

function renderGroup(q) {
  let h = `<div class="question"><div class="q-group">`;
  q.items.forEach(item => {
    const cur = answers[item.id] || 0;
    h += `<div class="q-group-item"><span class="q-group-label">${item.text}</span><div class="scale-mini">`;
    for (let i = 1; i <= 5; i++) h += `<span class="${cur===i?'selected':''}" data-gid="${item.id}" data-val="${i}">${i}</span>`;
    h += `</div></div>`;
  });
  h += `</div><div class="scale-labels" style="margin-top:8px"><span>1 = Não ajudou</span><span>5 = Ajudou muito</span></div></div>`;
  return h;
}

function renderSection() {
  updateHeader();
  const s = sections[current];
  let h = `<div class="section-eyebrow">${s.label}</div>`;
  h += `<h1 class="section-title">${s.title}</h1>`;
  h += `<p class="section-desc">${s.desc}</p>`;
  h += `<hr class="divider">`;
  s.questions.forEach(q => {
    if (q.type === 'single') h += renderSingle(q);
    else if (q.type === 'multi') h += renderMulti(q);
    else if (q.type === 'scale5') h += renderScale5(q);
    else if (q.type === 'text') h += renderText(q);
    else if (q.type === 'single+text') h += renderSingleText(q);
    else if (q.type === 'nps') h += renderNps(q);
    else if (q.type === 'group') h += renderGroup(q);
  });

  document.getElementById('sectionContent').innerHTML = h;
  document.getElementById('formCard').style.animation = 'none';
  void document.getElementById('formCard').offsetWidth;
  document.getElementById('formCard').style.animation = 'fadeUp 0.3s ease both';

  let nav = `<div class="nav-pills">`;
  sections.forEach((_, i) => {
    nav += `<div class="pip${i===current?' active':i<current?' done':''}"></div>`;
  });
  nav += `</div><div class="nav-btns">`;
  if (current > 0) nav += `<button class="btn" id="btnBack">Voltar</button>`;
  if (current < sections.length - 1) nav += `<button class="btn btn-primary" id="btnNext">Continuar</button>`;
  else nav += `<button class="btn btn-primary" id="btnSubmit">Enviar avaliação</button>`;
  nav += `</div>`;

  document.getElementById('navArea').innerHTML = nav;
  attachEvents();
}

function attachEvents() {
  document.querySelectorAll('input[type=radio]').forEach(el => {
    el.addEventListener('change', function () {
      const name = this.name, val = this.value;
      if (name.endsWith('_sel')) {
        const qid = name.replace('_sel', '');
        const prev = answers[qid] || { sel: '', txt: '' };
        answers[qid] = { sel: val, txt: prev.txt };
        document.querySelectorAll(`input[name="${name}"]`).forEach(r => r.closest('.opt').classList.toggle('selected', r.checked));
      } else {
        answers[name] = val;
        document.querySelectorAll(`input[name="${name}"]`).forEach(r => r.closest('.opt').classList.toggle('selected', r.checked));
      }
    });
  });

  document.querySelectorAll('input[type=checkbox]').forEach(el => {
    el.addEventListener('change', function () {
      const name = this.name;
      const cur = answers[name] || [];
      if (this.checked) { if (!cur.includes(this.value)) cur.push(this.value); }
      else { const i = cur.indexOf(this.value); if (i > -1) cur.splice(i, 1); }
      answers[name] = cur;
      this.closest('.opt').classList.toggle('selected', this.checked);
    });
  });

  document.querySelectorAll('.scale-btn').forEach(el => {
    el.addEventListener('click', function () {
      const qid = this.dataset.qid, val = parseInt(this.dataset.val);
      answers[qid] = val;
      document.querySelectorAll(`.scale-btn[data-qid="${qid}"]`).forEach(b => b.classList.toggle('selected', parseInt(b.dataset.val) === val));
    });
  });

  document.querySelectorAll('.nps-btn').forEach(el => {
    el.addEventListener('click', function () {
      const qid = this.dataset.qid, val = parseInt(this.dataset.val);
      answers[qid] = val;
      document.querySelectorAll(`.nps-btn[data-qid="${qid}"]`).forEach(b => b.classList.toggle('selected', parseInt(b.dataset.val) === val));
    });
  });

  document.querySelectorAll('.scale-mini span').forEach(el => {
    el.addEventListener('click', function () {
      const gid = this.dataset.gid, val = parseInt(this.dataset.val);
      answers[gid] = val;
      document.querySelectorAll(`.scale-mini span[data-gid="${gid}"]`).forEach(b => b.classList.toggle('selected', parseInt(b.dataset.val) === val));
    });
  });

  document.querySelectorAll('textarea').forEach(el => {
    el.addEventListener('input', function () {
      if (this.id.endsWith('_txt')) {
        const qid = this.id.replace('_txt', '');
        const prev = answers[qid] || { sel: '', txt: '' };
        answers[qid] = { sel: prev.sel, txt: this.value };
      } else {
        answers[this.id] = this.value;
      }
    });
  });

  const btnNext = document.getElementById('btnNext');
  if (btnNext) btnNext.addEventListener('click', () => { current++; renderSection(); window.scrollTo({ top: 0, behavior: 'smooth' }); });

  const btnBack = document.getElementById('btnBack');
  if (btnBack) btnBack.addEventListener('click', () => { current--; renderSection(); window.scrollTo({ top: 0, behavior: 'smooth' }); });

  const btnSubmit = document.getElementById('btnSubmit');
  if (btnSubmit) btnSubmit.addEventListener('click', submitForm);
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxuYcNewp4flRQoj1EZ_hLvQv3oYFK_hRqYPwwpxIoXgFTfXKtD4bbYI3pqcBJMfDrOxQ/exec';

async function submitForm() {
  const payload = {
    q1: answers.q1 || '', q2: answers.q2 || '', q3: answers.q3 || '',
    q4: answers.q4 || '', q5: answers.q5 || '', q6: answers.q6 || '',
    q7: answers.q7 || '',
    q8: answers.q8 || [],
    q9: answers.q9 || '',
    q10_sel: (answers.q10 || {}).sel || '',
    q10_txt: (answers.q10 || {}).txt || '',
    q11: answers.q11 || '', q12: answers.q12 || '', q13: answers.q13 || '',
    q14: answers.q14 || '', q15: answers.q15 || '',
    q16: answers.q16 || '', q17: answers.q17 || '',
    q18: answers.q18 || [],
    q19: answers.q19 !== undefined ? answers.q19 : '',
    q20: answers.q20 || '', q21: answers.q21 || '',
    q22: answers.q22 || '', q23: answers.q23 || '', q24: answers.q24 || '',
    q25: answers.q25 || [],
    q26: answers.q26 || '', q27: answers.q27 || ''
  };

  document.getElementById('navArea').innerHTML = `
    <div style="width:100%;display:flex;justify-content:center;align-items:center;gap:10px;color:var(--ink-3);font-size:13px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      Enviando...
    </div>`;

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showSuccess();
  } catch (err) {
    document.getElementById('navArea').innerHTML = `
      <div style="width:100%;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:#c0392b">Erro ao enviar. Tente novamente.</span>
        <button class="btn btn-primary" onclick="submitForm()">Tentar novamente</button>
      </div>`;
  }
}

function showSuccess() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Concluído';
  document.getElementById('sectionContent').innerHTML = `
    <div class="success">
      <div class="success-check">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Obrigado pela avaliação</h2>
      <p>Suas respostas vão nos ajudar a melhorar a Plataforma de Flashcards para você e para os próximos usuários.</p>
    </div>`;
  document.getElementById('navArea').innerHTML = '';
}

renderSection();
</script>
